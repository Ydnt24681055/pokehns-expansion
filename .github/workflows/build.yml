name: Build pokehns-expansion

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev tools-common

      - name: Fix git safe directory permissions
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build ROM
        run: |
          make -j$(nproc) modern

      - name: Upload compiled GBA ROM
        uses: actions/upload-artifact@v4
        with:
          name: pokehns-expansion-rom
          path: pokeemerald.gba
